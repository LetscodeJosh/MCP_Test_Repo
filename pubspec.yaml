name: mcp_profiling
description: A Flutter test environment app for MCP Test (HCP Profiling) interfacing with ERPNext v15.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  http: ^1.1.0
  provider: ^6.0.5
  intl: ^0.18.1
  geolocator: ^10.1.0
  image_picker: ^1.0.4
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  shared_preferences: ^2.2.2
  local_auth: ^2.1.8
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "icon-512.png"

flutter:
  uses-material-design: true
  assets:
    - assets/medical_bg.jpg
    - assets/institutions.json
